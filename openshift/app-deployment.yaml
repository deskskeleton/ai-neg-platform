# ============================================
# App Server Deployment for DSRI (OpenShift OKD 4.14)
# ============================================
# Deploys the Node.js app server that serves the React frontend,
# REST API, and WebSocket connections.
#
# Prerequisites:
#   1. Build and push: docker build -t ghcr.io/YOUR_GITHUB_USERNAME/neg-platform:latest . && docker push ...
#   2. Create secret: oc create secret generic neg-platform-env --from-literal=DATABASE_URL=... --from-literal=POSTGRES_PASSWORD=... --from-literal=ADMIN_PASSWORD=...
#   3. Apply: oc apply -f openshift/app-deployment.yaml
# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: neg-platform
  labels:
    app: neg-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neg-platform
  template:
    metadata:
      labels:
        app: neg-platform
    spec:
      # Uncomment if your ghcr.io image is private:
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      containers:
        - name: app
          # Replace YOUR_GITHUB_USERNAME with your actual GitHub username
          image: ghcr.io/YOUR_GITHUB_USERNAME/neg-platform:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: neg-platform-env
                  key: DATABASE_URL
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: LLM_MODEL
              value: "llama3.2"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neg-platform-env
                  key: ADMIN_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: neg-platform
  labels:
    app: neg-platform
spec:
  selector:
    app: neg-platform
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
# HTTPS route -- DSRI auto-provisions TLS via wildcard cert
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: neg-platform
  annotations:
    # Extend timeout for WebSocket connections (negotiation sessions last 10+ minutes)
    haproxy.router.openshift.io/timeout: 900s
spec:
  # Change this to your actual DSRI hostname
  host: neg-platform.apps.dsri2.unimaas.nl
  to:
    kind: Service
    name: neg-platform
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
