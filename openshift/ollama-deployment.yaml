# ============================================
# Ollama LLM Deployment for DSRI
# ============================================
# Default: GPU enabled (required for usable response times).
# CPU-only inference takes ~4 min per response and hits Ollama's
# 5-minute timeout, so GPU is the only viable mode for experiments.
#
# GPU node must be booked in advance via DSRI portal.
#
# To revert to CPU (e.g., to keep the pod alive between bookings):
#   1. Comment out nvidia.com/gpu: 1 and the tolerations block
#   2. oc apply -f openshift/ollama-deployment.yaml
#
# On first deploy, pull the model:
#   POD=$(oc get pods -l app=ollama -o jsonpath='{.items[0].metadata.name}')
#   oc exec $POD -- ollama pull llama3.1:8b
#
# The PVC ensures the model persists across pod restarts.
# ============================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ocs-storagecluster-cephfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
      annotations:
        io.kubernetes.cri-o.TrySkipVolumeSELinuxLabel: 'true'
    spec:
      runtimeClassName: selinux
      serviceAccountName: anyuid
      containers:
        - name: ollama
          image: ollama/ollama
          env:
            - name: OLLAMA_NUM_PARALLEL
              value: "4"
            # Model auto-pulled by the postStart hook below. Keep in sync with
            # LLM_MODEL on the neg-platform deployment.
            - name: LLM_MODEL
              value: "llama3.1:8b"
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "4"
              nvidia.com/gpu: 1
          # postStart: self-heal the model cache. If the PVC is empty (fresh
          # pod, new PV, or cache eviction), pull the configured model. If the
          # model is already present, `ollama pull` is a cheap no-op. We wait
          # briefly for the daemon's HTTP API to accept connections first.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in $(seq 1 30); do
                      if wget -q -O- http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
                        ollama pull "${LLM_MODEL:-llama3.1:8b}" && exit 0
                      fi
                      sleep 2
                    done
                    echo "ollama postStart: daemon did not come up in 60s" >&2
                    exit 0
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 60
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
