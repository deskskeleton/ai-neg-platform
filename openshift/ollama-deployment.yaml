# ============================================
# Ollama LLM Deployment for DSRI
# ============================================
# Self-hosted LLM serving via Ollama.
# On first deploy, exec into the pod and pull the model:
#   oc exec <pod-name> -- ollama pull llama3.2:3b
#
# The PVC ensures the model persists across pod restarts.
#
# GPU is enabled (nvidia.com/gpu: 1 in both requests and limits).
# Book GPU time via DSRI calendar before deploying.
# If GPU nodes have custom taints, uncomment the tolerations block below.
# ============================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
              nvidia.com/gpu: 1
            limits:
              memory: "8Gi"
              cpu: "4"
              nvidia.com/gpu: 1
      # Uncomment if DSRI GPU nodes have custom taints:
      # tolerations:
      #   - key: "nvidia.com/gpu"
      #     operator: "Exists"
      #     effect: "NoSchedule"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
