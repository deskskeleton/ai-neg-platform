# ============================================
# Ollama LLM Deployment for DSRI
# ============================================
# Default: CPU-only (GPU cores are time-limited and booked separately).
#
# To enable GPU (after booking a GPU node):
#   1. Uncomment `nvidia.com/gpu: 1` in resources.limits below
#   2. Uncomment the tolerations block in spec below
#   3. oc apply -f openshift/ollama-deployment.yaml
#   4. oc rollout restart deployment/ollama
#
# To revert to CPU (after GPU booking expires):
#   1. Comment out nvidia.com/gpu: 1 and the tolerations block
#   2. oc apply -f openshift/ollama-deployment.yaml
#   3. oc rollout restart deployment/ollama
#
# On first deploy, pull the model:
#   POD=$(oc get pods -l app=ollama -o jsonpath='{.items[0].metadata.name}')
#   oc exec $POD -- ollama pull llama3.2:3b
#
# The PVC ensures the model persists across pod restarts.
# ============================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ocs-storagecluster-cephfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
      annotations:
        io.kubernetes.cri-o.TrySkipVolumeSELinuxLabel: 'true'
    spec:
      runtimeClassName: selinux
      serviceAccountName: anyuid
      containers:
        - name: ollama
          image: ollama/ollama
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "4"
              # nvidia.com/gpu: 1   # Uncomment when GPU node is booked
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 60
      # tolerations:                    # Uncomment when GPU node is booked
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
