# ============================================
# Ollama LLM Deployment for DSRI
# ============================================
# Currently configured for CPU-only deployment.
#
# To switch to GPU:
#   1. Uncomment nvidia.com/gpu: 1 in resources.limits
#   2. Uncomment the tolerations block in spec
#   3. oc apply -f openshift/ollama-deployment.yaml
#
# On first deploy, pull the model:
#   POD=$(oc get pods -l app=ollama -o jsonpath='{.items[0].metadata.name}')
#   oc exec $POD -- ollama pull llama3.2:3b
#
# The PVC ensures the model persists across pod restarts.
# ============================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ocs-storagecluster-cephfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
      annotations:
        io.kubernetes.cri-o.TrySkipVolumeSELinuxLabel: 'true'
    spec:
      runtimeClassName: selinux
      serviceAccountName: anyuid
      containers:
        - name: ollama
          image: ollama/ollama
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "4"
              # GPU: uncomment below and the tolerations block in spec
              # nvidia.com/gpu: 1
      # GPU: uncomment tolerations when nvidia.com/gpu limit is set
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
