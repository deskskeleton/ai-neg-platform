# ============================================
# Docker Compose for local development
# ============================================
# Start all 3 services: app server, PostgreSQL, Ollama
#
# Usage:
#   docker compose up --build
#
# Then open http://localhost:3000 in your browser.
# ============================================

services:
  # Node.js app server (Express + Socket.io + built React frontend)
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://neg:neg@db:5432/negplatform
      OLLAMA_URL: http://ollama:11434
      LLM_MODEL: llama3.2
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: negplatform
      POSTGRES_USER: neg
      POSTGRES_PASSWORD: neg
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neg -d negplatform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Ollama LLM server (for AI assistant)
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
